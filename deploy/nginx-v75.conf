# V75 Dashboard — nginx reverse proxy
# Place at: /etc/nginx/sites-available/v75-dashboard
# Symlink:  ln -s /etc/nginx/sites-available/v75-dashboard /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name 130.162.58.230;

    # Redirect to HTTPS once certbot is set up (uncomment after certbot):
    # return 301 https://$host$request_uri;

    location / {
        proxy_pass http://127.0.0.1:8085;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed later)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 300s;
    }

    # Static files served directly by nginx (faster)
    location /static/ {
        alias /opt/v75-dashboard/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Service worker must be served from root
    location /sw.js {
        alias /opt/v75-dashboard/static/sw.js;
        add_header Cache-Control "no-cache";
        default_type application/javascript;
    }
}

# HTTPS server block — certbot will generate this automatically.
# After running certbot, it adds a server{} block listening on 443
# with SSL certs at /etc/letsencrypt/live/<domain>/
#
# If you get a domain name later, replace 130.162.58.230 with your domain
# and run:  sudo certbot --nginx -d yourdomain.com
